{% extends 'base.html' %}
{% block title %}Login — BookTix{% endblock %}

{% block content %}
<div class="container section">
  <div class="auth-wrap">
    <div class="auth-card card">
      <div class="auth-header">
        <span class="brand-icon" style="font-size:2rem">🎫</span>
        <h2>Welcome Back</h2>
        <p class="text-muted">Login to your BookTix account</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
        </div>
        {% if form.errors %}
          <div class="alert alert-error">Invalid username or password. Please try again.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary btn-block">Login →</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Sign up free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
